<!-- memories.html -->

<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Memórias ♡
  </title>


  <link
    rel="stylesheet"
    href="../../assets/files/css/memories.css"
  >

  <link
    rel="stylesheet"
    href="../../assets/files/css/fades.css"
  >

  <link
    rel="stylesheet"
    href="../../assets/files/css/base.css"
  >


  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Patrick+Hand&display=swap"
    rel="stylesheet"
  >

</head>

<body>



  <div class="background-blur"></div>


  <audio
    id="bgMusic"
    loop
  >

    <source
      src="../../assets/music/music.mp3"
      type="audio/mpeg"
    >

  </audio>


<div class="music-fixed">

  <button id="musicToggle">

    <img
      class="icon"
      src="../../assets/images/off.png"
      alt="music"
    >

  </button>

</div>


  <main>

    <section class="hero">

      <div class="hero-card">

        <span class="mini">
          nossas memórias ♡
        </span>

        <h1>
          memories
        </h1>

        <p>
          cada momento virou parte da nossa história.
        </p>


        <div class="memory-grid">

          <div class="memory-card">

            <span class="memory-date">
              25 nov 2025
            </span>

            <h3>
              nosso começo ♡
            </h3>

            <p>
              foi quando tudo começou a ganhar sentido.
            </p>

          </div>

          <div class="memory-card">

            <span class="memory-date">
              primeira call
            </span>

            <h3>
              madrugada juntos
            </h3>

            <p>
              horas conversando sem perceber o tempo passar.
            </p>

          </div>

          <div class="memory-card">

            <span class="memory-date">
              promessa ♡
            </span>

            <h3>
              ficar juntos
            </h3>

            <p>
              mesmo longe, sempre pertinho um do outro.
            </p>

          </div>

        </div>

      </div>

    </section>

  </main>


  <script src="../../assets/files/js/base.js"></script>

</body>
</html>
